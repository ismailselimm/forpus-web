name: Deploy to Vercel (Production)

# Selim main'e her push attığında çalışır ve siteyi otomatik yayına alır.
#
# Hobby planı, özel repoda hesap sahibinden (yusuf-safak) başkasının attığı
# commit'i deploy etmeyi engelliyor. Bunu aşmak için deploy öncesi HEAD'in
# üstüne hesap sahibi adına boş bir commit atıyoruz; böylece deploy edilen
# commit'in yazarı yusuf-safak olur ve blok devreye girmez. Deploy ayrıca
# yusuf-safak'a ait VERCEL_TOKEN ile yapılır.

on:
  push:
    branches: [main]

# Aynı anda tek deploy; arka arkaya push'larda öncekini iptal et.
concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Re-author HEAD as account owner (bypass Hobby commit-author block)
        run: |
          git config user.email "yusufsafakgg@gmail.com"
          git config user.name "yusuf-safak"
          git commit --allow-empty -m "CI: production deploy trigger"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
